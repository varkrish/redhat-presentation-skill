skill_id: rh-html-dark-contrast-panel
type: html-element
name: Dark Contrast Panel
css_class: inline-style (no named class)
description: >-
  Dark (#1a1a1a) card with a red top border used to present problem/solution
  pairs, opportunity cards, or high-contrast highlights. Arranged in a 2-column
  grid. ALWAYS add class="dark-panel" alongside inline styles so the @media print
  block can override it to a light card for ink-efficient printing.

when_to_use:
  - Problem → Solution pairing slides (e.g. "Labs Residency Opportunities").
  - High-contrast highlights where the default light card would not stand out.
  - When mixing dark and light cards on the same slide for visual hierarchy.
  - Best with 4–6 panels in a 2×2 or 2×3 grid.

constraints:
  - Background: #1a1a1a (not pure black).
  - Border-top: 4px solid var(--rh-red).
  - Border-radius: 6px.
  - Main body text: rgba(255,255,255,0.75), font-size 0.78em.
  - Heading/solution name: var(--rh-red), font-weight 700, font-size 0.92em.
  - Problem label: rgba(255,255,255,0.55), smaller text above the heading.
  - Footer/accounts line: rgba(255,255,255,0.4), font-size 0.72em.
  - Use &mdash; for em dashes and &rsquo; for apostrophes in dark card text.
  - Grid is always inline-style: display:grid; grid-template-columns:1fr 1fr; gap:12px.

html_pattern: |
  <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 14px;">

    <!-- IMPORTANT: always include class="dark-panel" for print overrides -->
    <div class="dark-panel" style="padding: 14px 16px;">
      <div style="font-size: 0.78em; color: rgba(255,255,255,0.55); line-height: 1.3; margin-bottom: 6px;">
        <strong style="color: rgba(255,255,255,0.7);">Problem:</strong> Description of the problem being solved.
      </div>
      <div style="font-size: 0.92em; font-weight: 700; color: var(--rh-red); margin-bottom: 3px;">Solution or Offering Name</div>
      <div style="font-size: 0.78em; color: rgba(255,255,255,0.75); line-height: 1.35;">
        How this solution addresses the problem. Keep to two to three sentences.
      </div>
      <div style="font-size: 0.72em; color: rgba(255,255,255,0.4); margin-top: 6px;">
        <strong>Accounts:</strong> Account A, Account B
      </div>
    </div>

    <!-- Repeat pattern for each panel -->

  </div>
