skill_id: rh-html-data-table
type: html-element
name: Data Table
css_class: table-container > leads-table
description: >-
  Striped HTML table for account lists, feature comparisons, and structured data.
  Uses table-layout:fixed with explicit column widths to prevent overflow.

when_to_use:
  - Account or participant summary tables.
  - Feature or capability comparison (columns = options, rows = criteria).
  - Structured data that doesn't fit neatly into cards or charts.
  - Keep to under 8 rows for readability within a single slide.

constraints:
  - Always use table-layout: fixed with explicit width% on th/td elements.
  - Total column widths must sum to 100%.
  - Header row: background var(--rh-gray-light), font-weight bold.
  - Even rows: background #f9f9f9 (via :nth-child(even)).
  - Font size: 0.85em — do not go smaller than 0.75em.
  - Wrap the table in .table-container for margin/overflow control.
  - Do not use a table for data that would be better as a bar chart or card list.

html_pattern: |
  <div class="table-container">
    <table class="leads-table">
      <thead>
        <tr>
          <th style="width:25%">Column One</th>
          <th style="width:20%">Column Two</th>
          <th style="width:55%">Column Three</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td><strong>Row 1 Name</strong></td>
          <td>Value</td>
          <td>Longer description that can wrap across multiple lines.</td>
        </tr>
        <tr>
          <td><strong>Row 2 Name</strong></td>
          <td>Value</td>
          <td>Longer description.</td>
        </tr>
        <tr>
          <td><strong>Row 3 Name</strong></td>
          <td>Value</td>
          <td>Longer description.</td>
        </tr>
      </tbody>
    </table>
  </div>
